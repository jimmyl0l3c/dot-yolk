# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

windowrule {
  name = windowrule-1
  suppress_event = maximize
  match:class = .*
}

windowrule {
  name = fullscreen-idle-inhibit
  idle_inhibit = fullscreen
  match:class = .*
}

# DP-3 = main
# DP-2 = second, vertical
# workspace definitions
workspace=1,monitor:DP-3,default:true
workspace=2,monitor:DP-3
workspace=3,monitor:DP-3
workspace=4,monitor:DP-3
workspace=5,monitor:DP-3

workspace=6,monitor:DP-2
workspace=7,monitor:DP-2
workspace=8,monitor:DP-2
workspace=9,monitor:DP-2

workspace=10,monitor:DP-3

# set default workspace of apps
windowrule {
  name = firefox
  workspace = 2
  match:class = ^firefox$
}

windowrule {
  name = zen
  workspace = 2
  match:class = ^app.zen_browser.zen$
}

windowrule {
  name = heroic
  workspace = 3
  match:class = ^heroic$
}


windowrule {
  name = discord
  workspace = 6
  match:class = ^discord.*$
}

windowrule {
  name = firefox-pip
  workspace = 6
  match:class = ^firefox$
  match:title = ^Picture-in-Picture$
}

windowrule {
  name = zen-pip
  workspace = 6
  match:class = ^app.zen_browser.zen$
  match:title = ^Picture-in-Picture$
}

windowrule {
  name = cider
  workspace = 7
  match:class = ^Cider$
}

# prevent steam notifications stealing focus by floating
windowrule {
  name = float-steam-notifications
  float = on
  match:class = ^([Ss]team)$
  match:title = negative:[Ss]team$
}

windowrule {
  name = steam-client
  workspace = 3 silent
  tile = on
  match:class = ^([Ss]team)$
  match:title = ^([Ss]team)$
}

# float steam friends in bottom right corner
windowrule {
  name = steam-friends
  float = on
  size = 280 860
  move = ((monitor_w*1)-window_w-10) ((monitor_h*1)-window_h-10)
  match:class = ^steam$
  match:initial_title = ^Friends List$
}

# disable fullscreen for battle.net
windowrule {
  name = battle-net
  fullscreen_state = 0
  match:title = ^Battle.net.*
}

# start games in fullscreen
windowrule {
  name = steam-games
  workspace = 10
  match:class = ^steam_app_\d+$
}

windowrule {
  name = gamescope
  workspace = 10
  fullscreen = on
  match:class = ^gamescope$
}

windowrule {
  name = ubi-connect
  fullscreen = on
  match:class = ^steam_app_\d+$
  match:initial_title = negative:^Ubisoft Connect$
  match:title = negative:^\s*$
}

# xwaylandvideobridge
windowrule {
  name = xwaylandvideobridge
  opacity = 0.0 override
  no_anim = on
  no_initial_focus = on
  max_size = 1 1
  no_blur = on
  no_focus = on
  match:class = ^(xwaylandvideobridge)$
}
